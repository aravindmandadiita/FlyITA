name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore FlyITA.slnx

      - name: Build
        run: dotnet build FlyITA.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/FlyITA.Tests.Unit/FlyITA.Tests.Unit.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/FlyITA.Tests.Integration/FlyITA.Tests.Integration.csproj --no-build --configuration Release --verbosity normal
